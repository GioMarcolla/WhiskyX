name: Build and Release Wine

on:
  workflow_dispatch:
    inputs:
      wine_version:
        description: 'Wine version to build (e.g., 11.7)'
        required: true
        default: '11.7'

jobs:
  build-wine:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew update
          brew install bison flex mingw-w64 molten-vk vulkan-loader

      - name: Make Build Script Executable
        run: chmod +x scripts/build_wine.sh

      - name: Build Wine
        run: ./scripts/build_wine.sh "${{ github.event.inputs.wine_version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: "13.0"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wine-latest
          name: Wine ${{ github.event.inputs.wine_version }}
          files: |
            build_output/Libraries.tar.gz
            build_output/Libraries/WhiskyWineVersion.plist
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
